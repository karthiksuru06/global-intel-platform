version: "3.9"

services:
  # ──────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────
  # Python Intelligence Engine
  # ──────────────────────────────────────

  intelligence-engine:
    build:
      context: ./intelligence-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/intelligence
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/intelligence
      INGESTION_INTERVAL_SECONDS: "30"
      CORRELATION_INTERVAL_SECONDS: "60"
      REDIS_STREAM_NAME: geo_events
      REDIS_CONSUMER_GROUP: intelligence_group
      LOG_LEVEL: INFO
      # Feature 2: Canary Injection
      CANARY_ENABLED: "true"
      CANARY_INTERVAL_MINUTES: "15"
      CANARY_SECRET: "dev-canary-secret-replace-in-prod"
      # Feature 3: S3 Anchor Replication (disabled by default)
      S3_ANCHOR_ENABLED: "false"
      S3_ANCHOR_BUCKET: ""
      S3_ANCHOR_REGION: "us-east-1"
      # Feature 4: Break-Glass Auth Tokens
      SOVEREIGN_BYPASS_TOKEN: "dev-bypass-token-replace-in-prod"
      SOVEREIGN_SECONDARY_AUTH: "dev-secondary-auth-replace-in-prod"
      SOVEREIGN_ANCHOR_KEY: "dev-anchor-key-replace-in-prod"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────
  # Node.js API Gateway
  # ──────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      REDIS_STREAM: geo_events
      REDIS_CONSUMER_GROUP: gateway_group
      REDIS_CONSUMER_NAME: gateway_1
      CORS_ORIGIN: http://localhost:5173
      INTEL_ENGINE_URL: http://intelligence-engine:8000
      LOG_LEVEL: info
      # Feature 5: Multi-role auth registry for dev (OPERATOR, ANALYST, SOVEREIGN)
      SOVEREIGN_REGISTRY_JSON: >-
        {"7f9e1d3c5b7a9f2e4d6c8b0a2f4e6d7f9e1d":{"role":"SOVEREIGN","owner":"System Admin (DEV)","expiresAt":"2027-01-01T00:00:00Z","scopes":["governance","admin"]},"op3r4t0r5e7a9f2e4d6c8b0a2f4e6d8a1b2c":{"role":"OPERATOR","owner":"Field Operator (DEV)","expiresAt":"2027-01-01T00:00:00Z","scopes":["read"]},"an4ly5t6b7a9f2e4d6c8b0a2f4e6d9c3d4e":{"role":"ANALYST","owner":"Intel Analyst (DEV)","expiresAt":"2027-01-01T00:00:00Z","scopes":["read","insights"]}}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────
  # Cesium Frontend
  # ──────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ──────────────────────────────────────
  # Production Reverse Proxy
  # ──────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-gateway
      - intelligence-engine
    restart: unless-stopped


volumes:
  redis_data:
  pg_data:
