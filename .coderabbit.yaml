# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/getting-started/configure-coderabbit

version: "1.0"
language: "en-US"

# Review settings
reviews:
  # Enable/disable high-level summary
  summary: true
  # Enable/disable chat instructions
  chat: true
  # Auto-approval settings (usually disabled for security)
  auto_approval: false

