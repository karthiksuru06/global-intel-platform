# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/getting-started/configure-coderabbit

version: "1.0"
language: "en-US"

# Chat settings (Top-level)
chat:
  enabled: true

# Review settings
reviews:
  # Enable/disable high-level summary
  high_level_summary: true
  
  # Fine-grained control over files to review or ignore
  # path_filters:
  #   - "!**/node_modules/**"
  #   - "!**/dist/**"
  #   - "!**/*.log"

  # Custom instructions for the AI reviewer (placed under reviews)
  # instructions: |
  #   Please ensure all code follows the "The 5 Golden Rules" as defined in docs/CORE_PHILOSOPHY.md.
  #   Focus on geospatial performance and real-time safety.
